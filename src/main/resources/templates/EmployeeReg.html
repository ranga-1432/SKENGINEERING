<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Register</title>

    <style>

        *{
            margin:0;
            padding:10;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:linear-gradient(to right,#dfe9f3,#ffffff);
            min-height:100vh;
            display:flex;
            flex-direction:column;
        }

        header{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:20px;
            font-size:32px;
            font-weight:bold;
            letter-spacing:2px;
        }

        footer{
            margin-top:auto;
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:15px;
            font-size:18px;
        }

        .container{
            width:400px;
            background:white;
            margin:50px auto;
            padding:35px;
            border-radius:15px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#0d6efd;
        }

        input{
			display:block;
            width:100%;
            padding:12px;
            margin-top:10px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
			
        }

        input:focus{
            outline:none;
            border-color:#0d6efd;
            box-shadow:0px 0px 5px rgba(13,110,253,0.5);
        }

        button{
            width:100%;
            padding:12px;
            background:#0d6efd;
			margin-top: 15px;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#084298;
        }

    </style>

</head>

<body>

<header>
    SKENGINEERING
</header>

<div class="container">

    <h1>Employee Register</h1>

    <form th:action="@{/sk/save}"method="post">
		<div class="form-group">
		       <label>NAME</label>
		       <input type="text" name="employeename" class="form-control"/>
		   </div>

		   <div class="form-group">
		       <label>PHONE</label>
		       <input type="text" name="phone" class="form-control"/>
		   </div>

		   <div class="form-group">
		       <label>DEPARTMENT</label>
		       <select name="dept" class="form-control">
		           <option value="">-SELECT-</option>
		           <option value="Cutting">Cutting Department</option>
		           <option value="Meachining">Machining Department</option>
		           <option value="sales">Sales Department</option>
		       </select>
		   </div>
		   <div class="form-group">
		   		       <label>Salary</label>
		   		       <input type="salary" name="salary" class="form-control"/>
		   		   </div>

		   <div class="form-group">
		       <label>JOINING DATE</label>
		       <input type="date" name="joiningDate" class="form-control"/>
		   </div>

		   <div class="form-group">
		       <label>ADDRESS</label>
		       <input type="address" name="address" class="form-control"/>
		   </div>

		   <div class="form-group">
		       <label>PASSWORD</label>
		       <input type="password" name="password" class="form-control"/>
		   </div>
		<button type="submit" class="btn btn-success">CREATE</button>
		<button th:href="@{/sk/login}" class="btn btn-success">login</button>
		<!--<button th:href="@{/sk/all}" class="btn btn-warning">ALL</button>-->

       
        <button type="submit">Register</button>

    </form>

</div>
<div class="card-footer bg-info text-white" th:if="${message!=null}">
[[${message}]]
</div>
<footer>
    © 2026 SKENGINEERING
</footer>

</body>
</html>
