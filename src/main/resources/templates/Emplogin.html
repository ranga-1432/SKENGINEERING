<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Employee Login</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
<style>

body{
    margin:0;
    padding:0;
    background:#dfe6ee;
    font-family:Arial;
}

.header{
    background:#1565ff;
    color:white;
    text-align:center;
    padding:20px;
    font-size:40px;
    font-weight:bold;
}

.container{
    width:400px;
    background:white;
    margin:60px auto;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 0px 10px gray;
}

h1{
    text-align:center;
    color:#1565ff;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:18px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

.btn{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    color:white;
    background:#1565ff;
}

.links{
    text-align:center;
    margin-top:20px;
}

.links a{
    text-decoration:none;
    color:#1565ff;
    font-size:16px;
    margin:10px;
}

.footer{
    background:#1565ff;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:40px;
    font-size:20px;
}

</style>

</head>

<body>

<div class="header">
    SKENGINEERING
</div>

<div class="container">

<h1>Employee Login</h1>

<form th:action="@{/sk/login}" method="post">

    <div class="form-group">
        <label>PHONE</label>
        <input type="text" name="phone" placeholder="Enter Phone Number">
    </div>

    <div class="form-group">
        <label>PASSWORD</label>
        <input type="Password" name="password" placeholder="Enter Password">
    </div>

    <button type="submit" class="btn">
        LOGIN
    </button>

</form>

<div class="links">

    <a th:href="@{/sk/register}">
        If you are a new user? Register
    </a>

    <br><br>

    <a th:href="@{/sk/forgot}">
        Forgot Password?
    </a>
	<a th:href="@{/sk/all}" class="btn btn-warning">All</a>

</div>

</div>

<div class="footer">
    SKENGINEERING
</div>
<h3 th:text="${msg}"></h3>
</body>
</html>
